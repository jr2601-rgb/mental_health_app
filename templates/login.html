<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AI Mental Health</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .auth-wrap { max-width: 460px; margin: 0 auto; width: 100%; }
    .tab-row {
      display: flex;
      background: rgba(255,255,255,0.35);
      border-radius: 100px;
      padding: 4px;
      margin-bottom: 2rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--text-mid);
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      background: var(--white);
      color: var(--primary);
      box-shadow: 0 2px 10px rgba(79,70,229,0.2);
    }
    .form-panel { display: none; animation: pageIn 0.4s ease both; }
    .form-panel.active { display: block; }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .brand h2 { font-size: 1.5rem; color: var(--text-dark); }
    .brand p { font-size: 0.9rem; color: var(--text-mid); }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .icon-left {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      font-size: 1rem; pointer-events: none;
    }
    .input-icon-wrap input { padding-left: 2.8rem; }
    .forgot { font-size: 0.85rem; color: var(--primary); text-align: right; display: block; margin-top: -0.8rem; margin-bottom: 1rem; text-decoration: none; }
    .forgot:hover { text-decoration: underline; }
    .social-hint { text-align: center; margin-top: 1rem; font-size: 0.88rem; color: var(--text-light); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="page">
    <div class="page-inner auth-wrap">
      <div class="card">
        <div class="brand">
          <div class="icon">🧠</div>
          <h2>Welcome Back</h2>
          <p>Sign in to continue your mental wellness journey</p>
        </div>

        {% if error %}
        <div class="alert alert-error">⚠️ {{ error }}</div>
        {% endif %}

        <div class="tab-row">
          <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
          <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div class="form-panel active" id="panel-login">
          <form method="POST" action="{{ url_for('login') }}" onsubmit="return validateForm('login')">
            <input type="hidden" name="action" value="login">
            <div class="form-group">
              <label for="login-user">Username</label>
              <div class="input-icon-wrap">
                <span class="icon-left">👤</span>
                <input type="text" id="login-user" name="username" placeholder="your_username" required>
              </div>
            </div>
            <div class="form-group">
              <label for="login-pass">Password</label>
              <div class="input-icon-wrap">
                <span class="icon-left">🔒</span>
                <input type="password" id="login-pass" name="password" placeholder="••••••••" required>
              </div>
            </div>
            <a href="#" class="forgot">Forgot password?</a>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In →</button>
          </form>
        </div>

        <!-- REGISTER FORM -->
        <div class="form-panel" id="panel-register">
          <form method="POST" action="{{ url_for('login') }}" onsubmit="return validateForm('register')">
            <input type="hidden" name="action" value="register">
            <div class="form-group">
              <label for="reg-user">Username</label>
              <div class="input-icon-wrap">
                <span class="icon-left">👤</span>
                <input type="text" id="reg-user" name="username" placeholder="choose_username" required minlength="3">
              </div>
            </div>
            <div class="form-group">
              <label for="reg-email">Email</label>
              <div class="input-icon-wrap">
                <span class="icon-left">✉️</span>
                <input type="email" id="reg-email" name="email" placeholder="you@example.com" required>
              </div>
            </div>
            <div class="form-group">
              <label for="reg-pass">Password</label>
              <div class="input-icon-wrap">
                <span class="icon-left">🔒</span>
                <input type="password" id="reg-pass" name="password" placeholder="••••••••" required minlength="6">
              </div>
            </div>
            <div id="reg-error" class="alert alert-error" style="display:none"></div>
            <button type="submit" class="btn btn-accent btn-full btn-lg">Create Account →</button>
          </form>
        </div>

        <div class="social-hint">
          <a href="{{ url_for('welcome') }}" style="color:var(--primary);text-decoration:none">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
      document.getElementById('panel-login').classList.toggle('active', tab==='login');
      document.getElementById('panel-register').classList.toggle('active', tab==='register');
    }
    function validateForm(type) {
      if (type === 'register') {
        const pw = document.getElementById('reg-pass').value;
        const err = document.getElementById('reg-error');
        if (pw.length < 6) { err.textContent='Password must be at least 6 characters.'; err.style.display='block'; return false; }
        err.style.display='none';
      }
      return true;
    }
    // If error and action was register, switch tab
    {% if error and request.form.get('action') == 'register' %}
    switchTab('register');
    {% endif %}
  </script>
</body>
</html>
